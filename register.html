<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f172a, #1e3a8a);
      color: white;
      text-align: center;
    }

    .box {
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Registrations will be opening soon </h1>
    <p>Stay tuned for updates!</p>
  </div>

</body>
</html>
